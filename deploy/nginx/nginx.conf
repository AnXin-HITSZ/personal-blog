server {
    listen 80;
    server_name anxin-hitsz.com 8.135.60.136;
    charset utf-8;

    # 前端静态文件
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1k;
    gzip_vary on;

    # ---------- API 反向代理 ----------

    # 所有 API 均经过 Spring Boot（含 /api/agent/，由 Boot 做 JWT 验证后转发）
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持：禁用缓冲，确保流式数据实时推送
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
    }

    # 用户认证 API（/user/* 路径）
    location /user/ {
        proxy_pass http://backend:8080/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 部署 Webhook（直连 Agent，无需 JWT） ----------
    location /webhook/ {
        proxy_pass http://agent:8000/api/agent/deploy/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---------- 前端 SPA 路由 ----------

    # 静态文件直接返回
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由回退：所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
