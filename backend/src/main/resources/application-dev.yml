# ============================================
# 本地开发环境配置
# 使用方式：
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. 以 dev profile 启动 backend:
#      - IDE: VM options 添加 -Dspring.profiles.active=dev
#      - Maven: mvn spring-boot:run -Dspring.profiles.active=dev
# ============================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/personal_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456
  data:
    redis:
      host: localhost
      port: 6379

# 覆盖 JWT 配置（可使用固定值方便调试）
jwt:
  secret: dev-secret-key-for-local-testing-only
  expiration: 86400000

# 本地 Qdrant 连接（若后端有对应配置）
qdrant:
  url: http://localhost:6333
  api-key:

# AI Agent 服务地址（生产环境由 Docker 注入，本地不启动 Agent 则用任意值占位）
fastapi:
  service:
    url: http://localhost:8000

logging:
  level:
    org.springframework.security: DEBUG
    com.anxin_hitsz: DEBUG
